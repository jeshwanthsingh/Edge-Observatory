server:
  port: 8083
management:
  server:
    port: 8080
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    prometheus:
      enabled: true

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/observatory}
    username: ${DB_USER:observatory}
    password: ${DB_PASSWORD:observatory}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000
      pool-name: ChaosLoggerPool
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      group-id: chaos-logger
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer
